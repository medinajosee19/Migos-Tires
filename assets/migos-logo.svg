<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="title">
<title id="title">Migos Tires</title>
<defs>
  <linearGradient id="redText" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#ff3a42"/>
    <stop offset=".45" stop-color="#e01821"/>
    <stop offset="1" stop-color="#8a050b"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
    <feDropShadow dx="12" dy="14" stdDeviation="0" flood-color="#000" flood-opacity=".78"/>
    <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity=".65"/>
  </filter>
</defs>
<g transform="skewX(-10)" filter="url(#shadow)">
  <text x="20" y="150" font-family="Impact, 'Arial Black', sans-serif" font-size="150" font-style="italic" font-weight="900" fill="url(#redText)" stroke="#fff" stroke-width="2.2" paint-order="stroke fill">MIG</text>
  <g transform="translate(315 38)">
    <circle cx="64" cy="64" r="62" fill="#050506" stroke="#111" stroke-width="10"/>
    <circle cx="64" cy="64" r="50" fill="none" stroke="#3a3a42" stroke-width="13" stroke-dasharray="16 10"/>
    <circle cx="64" cy="64" r="30" fill="#070708" stroke="#303038" stroke-width="7"/>
    <circle cx="64" cy="64" r="12" fill="#202028"/>
    <g stroke="#d9d9de" stroke-width="5" opacity=".42">
      <line x1="64" y1="24" x2="64" y2="104"/>
      <line x1="24" y1="64" x2="104" y2="64"/>
      <line x1="36" y1="36" x2="92" y2="92"/>
      <line x1="92" y1="36" x2="36" y2="92"/>
    </g>
  </g>
  <text x="443" y="150" font-family="Impact, 'Arial Black', sans-serif" font-size="150" font-style="italic" font-weight="900" fill="url(#redText)" stroke="#fff" stroke-width="2.2" paint-order="stroke fill">S</text>
  <text x="28" y="270" font-family="Impact, 'Arial Black', sans-serif" font-size="98" font-style="italic" font-weight="900" letter-spacing="18" fill="#fff">TIRES</text>
</g>
</svg>